<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛玉林 | 个人主页</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpolygon points='32,4 39,24 58,26 42,40 46,60 32,50 18,60 22,40 6,26 25,24' fill='%23a86bff'/%3E%3C/svg%3E">
    <style>
        /* === 新增本地字体定义 === */
        @font-face {
            font-family: 'HYWenHei';
            src: url('resources/HYWenHei-45W-5.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; overscroll-behavior: none; background: #040307; color: #e6e2ff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", 'HYWenHei', "Helvetica Neue", sans-serif;
            overflow-x: hidden; }
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 15% 20%, rgba(255,255,255,0.06), transparent 18%),
                        radial-gradient(circle at 85% 15%, rgba(173,84,255,0.08), transparent 14%),
                        linear-gradient(160deg, rgba(86,50,162,0.1), transparent 45%, rgba(3,2,8,0.7));
            pointer-events: none; z-index: -2;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #040307; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #7a4ac7, #b07fff); border-radius: 8px; }

        .page { width: 100%; min-height: 100vh; }

        /* Hero */
        .hero {
            width: 100vw; margin-left: calc(50% - 50vw); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            padding: 2rem 1.5rem;
            background: radial-gradient(ellipse 900px 700px at center top, rgba(220,160,255,0.65) 0%, rgba(190,130,255,0.35) 20%, rgba(140,80,220,0.12) 45%, transparent 65%),
                        linear-gradient(180deg, rgba(21,12,42,0.92) 0%, rgba(10,6,18,0.85) 60%, #07040e 100%);
            position: relative; overflow: hidden;
        }
        .hero-inner { max-width: 800px; text-align: center; z-index: 1; }
        .avatar { width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid rgba(200,140,255,0.8);
            box-shadow: 0 0 30px rgba(200,140,255,0.5), 0 0 60px rgba(168,107,255,0.3);
            margin-bottom: 2rem; object-fit: cover; }
        .name {
            font-size: clamp(2.2rem, 6vw, 3.2rem); font-weight: 700; letter-spacing: 0.04em;
            color: #fff1ff;
            /* === 去掉 text-shadow，姓名辉光已移除 === */
            margin-bottom: 0.5rem; line-height: 1.1;
        }
        .tagline { font-size: 1.15rem; color: #ffd9fb; opacity: 0.85; margin-bottom: 0.8rem; }
        .contact-info { font-size: 1rem; color: #cdb9ff; margin-bottom: 2.2rem; }
        .contact-info span { color: #ffd9fb; font-weight: 500; }

        .social-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .social-btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px; border-radius: 30px;
            background: rgba(20,10,40,0.5); border: 1px solid rgba(168,107,255,0.25);
            color: #ffd8fb; text-decoration: none; font-size: 0.95rem; font-weight: 500;
            backdrop-filter: blur(8px); transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: rgba(168,107,255,0.2); border-color: #ff79c6;
            box-shadow: 0 0 18px rgba(255,121,198,0.3); transform: translateY(-2px);
        }

        /* 粒子层 */
        .particles { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff7ff, #ffd9fb, #a86bff);
            box-shadow: 0 0 15px rgba(220,160,255,0.8), 0 0 30px rgba(168,107,255,0.5);
            opacity: 0.85;
            animation: floatAnim 6s infinite alternate ease-in-out;
        }
        @keyframes floatAnim {
            0% { transform: translate3d(0, 0, 0); opacity: 0.9; }
            100% { transform: translate3d(12px, -12px, 0); opacity: 0.5; }
        }

        /* 内容区 */
        .content { padding: 4rem 1.5rem 4rem; background: linear-gradient(180deg, rgba(6,4,12,0.8) 0%, #040307 100%); }
        .container { max-width: 880px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }

        .glass-card {
            padding: 2.4rem 2.6rem; border-radius: 24px;
            background: linear-gradient(145deg, rgba(22,14,42,0.55), rgba(10,6,20,0.75));
            border: 1px solid rgba(168,107,255,0.25);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04), 0 0 20px rgba(168,107,255,0.15);
            backdrop-filter: blur(16px); transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .fade-up { opacity: 0; transform: translateY(30px); }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        .section-title {
            font-size: 1.5rem; font-weight: 700; color: #ffe6ff; margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::before {
            content: "✦"; color: #ff79c6; font-size: 1.3rem; text-shadow: 0 0 10px rgba(255,121,198,0.7);
        }

        .about-text { line-height: 1.8; font-size: 1.02rem; color: #e7e3ff; opacity: 0.92; }

        .skill-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-tag {
            padding: 6px 16px; border-radius: 16px; font-size: 0.9rem; font-weight: 500;
            background: rgba(168,107,255,0.12); border: 1px solid rgba(168,107,255,0.25);
            color: #e6e2ff; transition: all 0.25s;
        }
        .skill-tag:hover {
            background: rgba(168,107,255,0.25); border-color: #ff79c6; color: #fff;
            box-shadow: 0 0 12px rgba(168,107,255,0.4); transform: translateY(-1px);
        }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.4rem; margin-top: 0.8rem; }
        .project-card {
            background: linear-gradient(180deg, rgba(30,18,50,0.45), rgba(12,8,22,0.6));
            border: 1px solid rgba(168,107,255,0.12); border-radius: 18px;
            padding: 1.8rem; text-decoration: none; color: inherit; transition: all 0.4s ease;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .project-card::after {
            content: ""; position: absolute; top: 0; right: 0; left: 0; bottom: 0;
            background: radial-gradient(circle at top right, rgba(168,107,255,0.15), transparent 60%);
            opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
        }
        .project-card:hover { transform: translateY(-6px); border-color: rgba(168,107,255,0.4);
            box-shadow: 0 20px 40px rgba(100,50,180,0.4), 0 0 30px rgba(200,140,255,0.3); }
        .project-card:hover::after { opacity: 1; }
        .project-card h4 { color: #ffd9fb; font-size: 1.15rem; margin-bottom: 0.6rem; font-weight: 600; }
        .project-card p { font-size: 0.93rem; color: #d7d0ff; opacity: 0.9; line-height: 1.5; }

        footer { text-align: center; padding: 2.5rem 1rem 1rem; color: #b89dff; opacity: 0.75; font-size: 0.9rem; }
        footer a { color: inherit; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .hero { min-height: 100vh; padding: 2rem 1rem; }
            .name { font-size: 2rem; }
            .glass-card { padding: 1.8rem 1.5rem; border-radius: 18px; }
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="importmap">
        { "imports": { "vue": "https://unpkg.com/vue@3.4.27/dist/vue.esm-browser.js" } }
    </script>
    <script type="module">
        import { createApp, ref, reactive, onMounted, onUnmounted, nextTick } from 'vue';

        const app = createApp({
            setup() {
                const isTouch = ref(false);
                const checkTouch = () => {
                    isTouch.value = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
                };
                checkTouch();

                const user = reactive({
                    name: '毛玉林',
                    tagline: '南开大学 · 软件工程 · 研0（准研究生）',
                    avatar: 'resources/152751844.png',
                    github: 'https://github.com/Lead2one',
                    email: 'ayxwdcx@163.com',
                });

                const skills = ref([
                    'Java', 'Python', 'C++', 'SQL', 'JavaScript', 'HTML/CSS',
                    'Vue.js', 'SpringBoot', 'Redis', 'PyTorch', 'LangChain',
                    'Linux', 'Git', 'Docker', 'ROS', 'GTest', 'QT'
                ]);

                const projects = ref([
                    {
                        title: '推荐算法投毒攻击研究',
                        desc: '国家级大创项目｜PyTorch开发Web平台，集成多种推荐算法，支持投毒攻击模拟与可视化评估。',
                        link: 'https://github.com/Lead2one/Recommendation_Algorithm-and-Poisoning_Attacks'
                    },
                    {
                        title: 'LangChain智能客服系统',
                        desc: '中软国际项目｜Vue + LangChain + 大模型API，覆盖美食/医疗/交通/旅行场景，集成语音与地图服务。',
                        link: 'https://github.com/Lead2one/Enterprise-Practice0-END'
                    },
                    {
                        title: 'Ash Impact 横板射击游戏',
                        desc: 'C++/QT课程大作业｜独立开发角色操控、碰撞检测等机制，入选校级展示活动。',
                        link: 'https://github.com/Lead2one/Ark-Ash-Impact'
                    }
                ]);

                const particles = ref([]);
                const initParticles = () => {
                    if (isTouch.value) return;
                    const arr = [];
                    for (let i = 0; i < 12; i++) {
                        arr.push({
                            left: Math.random() * 90 + '%',
                            top: Math.random() * 80 + '%',
                            delay: Math.random() * 3 + 's',
                            duration: 5 + Math.random() * 5 + 's',
                            size: 4 + Math.random() * 6 + 'px',
                        });
                    }
                    particles.value = arr;
                };

                let observer = null;
                const setupScrollReveal = () => {
                    const elements = document.querySelectorAll('.fade-up');
                    if (elements.length === 0) return;
                    observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) entry.target.classList.add('visible');
                        });
                    }, { threshold: 0.15 });
                    elements.forEach(el => observer.observe(el));
                };

                onMounted(() => {
                    initParticles();
                    nextTick(() => {
                        setupScrollReveal();
                    });
                });

                onUnmounted(() => {
                    if (observer) observer.disconnect();
                });

                return { isTouch, user, skills, projects, particles };
            },
            template: `
            <main class="page">
                <section class="hero">
                    <div v-if="!isTouch" class="particles">
                        <div v-for="(p, i) in particles" :key="i" class="particle"
                             :style="{ left: p.left, top: p.top, animationDelay: p.delay, animationDuration: p.duration, width: p.size, height: p.size }">
                        </div>
                    </div>
                    <div class="hero-inner">
                        <img :src="user.avatar" alt="头像" class="avatar"
                             @error="e => { e.target.style.display='none'; }">
                        <h1 class="name">{{ user.name }}</h1>
                        <p class="tagline">{{ user.tagline }}</p>
                        <p class="contact-info">✉️ <span>{{ user.email }}</span></p>
                        <div class="social-links">
                            <a :href="user.github" target="_blank" class="social-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
                                GitHub
                            </a>
                        </div>
                    </div>
                </section>

                <div class="content">
                    <div class="container">
                        <div class="glass-card fade-up">
                            <h2 class="section-title">关于我</h2>
                            <p class="about-text">
                                南开大学软件工程专业2026届本科毕业生，已获得保研本院资格，目前为研0准研究生。在校期间专业排名前30%，主修C++、数据结构、数据库、Java等课程。
                                具备扎实的工程实践与科研能力，曾负责大创项目、企业实习及多个独立开发项目。希望在研究生入学前寻求算法/软件开发方向的实习机会。
                            </p>
                        </div>

                        <div class="glass-card fade-up">
                            <h2 class="section-title">技能</h2>
                            <div class="skill-tags">
                                <span v-for="skill in skills" :key="skill" class="skill-tag">{{ skill }}</span>
                            </div>
                        </div>

                        <div class="glass-card fade-up">
                            <h2 class="section-title">项目精选</h2>
                            <div class="project-grid">
                                <a v-for="proj in projects" :key="proj.title" :href="proj.link" class="project-card" target="_blank">
                                    <h4>✦ {{ proj.title }}</h4>
                                    <p>{{ proj.desc }}</p>
                                </a>
                            </div>
                        </div>
                    </div>
                    <footer>
                        <p>✦ <a href="https://crux-endfield.xyz" target="_blank" rel="noopener noreferrer">终末星界秘所</a> · 毛玉林 © 2025</p>
                    </footer>
                </div>
            </main>
            `
        });

        app.mount('#app');
    </script>
</body>
</html>
